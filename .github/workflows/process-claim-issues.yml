name: Process credential claims
run-name: Process claim issue #${{ github.event.issue.number }}

on:
  issues:
    types:
      - opened
      - reopened
      - edited

permissions:
  actions: write
  contents: write
  issues: write

jobs:
  process-claims:
    runs-on: ubuntu-latest
    env:
      CLAIM_RESULT_PATH: ${{ runner.temp }}/skillcraft-claim-result.json
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Process credential claim issue
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SKILLCRAFT_CLAIM_RESULT_PATH: ${{ env.CLAIM_RESULT_PATH }}
        run: node .github/scripts/process-claim.mjs

      - name: Commit issued credential updates
        id: commit-issued-updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add issued/users/
          if git diff --cached --quiet; then
            echo "No credential updates."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: issue credential for #${{ github.event.issue.number }}"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Dispatch publish pages
        if: ${{ steps.commit-issued-updates.outputs.pushed == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run publish-pages.yml --ref main

      - name: Notify Crafty of issued credential
        if: ${{ steps.commit-issued-updates.outputs.pushed == 'true' }}
        env:
          # Configure these repository secrets to enable Discord-side unlocks and announcements.
          CRAFTY_WEBHOOK_URL: ${{ secrets.CRAFTY_WEBHOOK_URL }}
          CRAFTY_WEBHOOK_SECRET: ${{ secrets.CRAFTY_WEBHOOK_SECRET }}
          CRAFTY_WEBHOOK_DELIVERY_ID: claim-${{ github.event.issue.number }}-${{ github.run_id }}-${{ github.run_attempt }}
        run: node .github/scripts/notify-crafty.mjs "$CLAIM_RESULT_PATH"
