name: Process credential claims
run-name: Process claim issue #${{ github.event.issue.number }}

on:
  issues:
    types:
      - opened
      - reopened
      - edited

permissions:
  actions: write
  contents: write
  issues: write

jobs:
  process-claims:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Process credential claim issue
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node .github/scripts/process-claim.mjs

      - name: Commit issued credential updates
        id: commit-issued-updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add credentials/index.json issued/users/index.json issued/users/
          if git diff --cached --quiet; then
            echo "No credential updates."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: issue credential for #${{ github.event.issue.number }}"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Dispatch publish pages
        if: ${{ steps.commit-issued-updates.outputs.pushed == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run publish-pages.yml --ref main
