name: Build credentials indexes

on:
  push:
    branches:
      - main
    paths:
      - 'credentials/*/*/credential.yaml'
      - 'issued/users/**/*/credential.yaml'
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build credentials indexes
        env:
          SKILLCRAFT_PAGES_BASE_URL: https://skillcraft.gg
        run: node .github/scripts/build-credentials-index.mjs

      - name: Commit updated indexes
        id: commit-index-updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add credentials/index.json issued/users/index.json
          if git diff --cached --quiet; then
            echo "No index changes."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: refresh credential indexes"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Dispatch publish pages
        if: ${{ github.event_name == 'push' || steps.commit-index-updates.outputs.pushed == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run publish-pages.yml --ref main
